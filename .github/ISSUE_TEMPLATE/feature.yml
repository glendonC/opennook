name: Feature request
description: Propose a new feature or an API change.
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        OpenNook is small and opinionated — not every good idea fits. Before
        filing, please skim the README and (if you can) the roadmap to see
        whether the feature is already planned, deliberately deferred, or
        explicitly out of scope.

  - type: textarea
    id: problem
    attributes:
      label: The problem
      description: What can't you do today? What did you reach for and find missing?
    validations:
      required: true

  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
      description: |
        How would you like this to work? If it's an API change, sketch the call
        site — that surfaces ergonomics faster than prose.
      placeholder: |
        ```swift
        var configuration = NookConfiguration()
        configuration.foo = …
        ```
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you weighed and why you rejected them.
    validations:
      required: false

  - type: dropdown
    id: layer
    attributes:
      label: Which layer would this live in?
      options:
        - NookSurface (MIT — notch window engine; keep thin)
        - NookKit (Apache-2.0 — app chrome)
        - NookComponents (Apache-2.0 — opt-in add-ons)
        - NookApp / demo app
        - Documentation / examples
        - Not sure
    validations:
      required: true

  - type: textarea
    id: context
    attributes:
      label: Additional context
      description: Links to prior art, related issues, or your concrete use case.
    validations:
      required: false
