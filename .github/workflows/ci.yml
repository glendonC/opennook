# OpenNook continuous integration.
#
# Runs the full build + test matrix on every push to main and every PR, plus a
# license-header sanity check that pins the dual-license boundary
# (Sources/NookSurface is MIT; everything else is Apache-2.0). The Xcode build
# is included so the SPM <-> Xcode parity README claim ("behavior cannot drift
# between them") is actually verified.

name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  spm:
    name: SwiftPM build & test (Xcode ${{ matrix.xcode }})
    runs-on: macos-15
    strategy:
      # One toolchain regression shouldn't cancel the others - we want to see the full
      # matrix result, especially which Xcode broke.
      fail-fast: false
      matrix:
        # `latest-stable` is the required baseline. `latest` (which may be a beta when one
        # is installed on the image) is a forward-looking toolchain-drift signal and is
        # non-blocking via `continue-on-error` below, so a future Xcode can't wedge merges.
        xcode: ['latest-stable']
        include:
          - xcode: 'latest'
            experimental: true
    continue-on-error: ${{ matrix.experimental == true }}
    steps:
      - uses: actions/checkout@v4
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: ${{ matrix.xcode }}
      - name: Show Swift version
        run: swift --version
      - name: Build (all targets)
        run: swift build
      - name: Test
        run: swift test --parallel

  xcode:
    name: Xcode build (parity with SPM)
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # Match the SPM jobs' toolchain: the Liquid Glass surface style references the
      # macOS 26 SDK (`Glass` / `.glassEffect`), which only `latest-stable` carries -
      # the runner's default Xcode does not, so the parity build fails without this.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      - name: Install XcodeGen
        run: brew install xcodegen
      - name: Regenerate project from project.yml
        run: ./Scripts/regenerate-xcodeproj.sh
      - name: Build the Xcode app target
        shell: bash
        run: |
          set -o pipefail
          xcodebuild \
            -project Nook.xcodeproj \
            -scheme NookHostApp \
            -configuration Debug \
            -destination 'platform=macOS' \
            build | xcbeautify

  licenses:
    name: License-header sanity
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      - name: Check NookSurface files carry SPDX MIT, everything else Apache-2.0
        run: |
          set -euo pipefail
          fail=0

          # Guard against a vacuous pass: if the dual-license layout ever moves (e.g.
          # `Sources/NookSurface` is renamed), the find loops below would iterate over
          # nothing and the check would succeed without verifying anything. Assert the
          # expected directories actually contain Swift files first.
          mit_count=$(find Sources/NookSurface -name '*.swift' | wc -l | tr -d ' ')
          apache_count=$(find Sources Tests Examples App -name '*.swift' -not -path 'Sources/NookSurface/*' | wc -l | tr -d ' ')
          if [ "$mit_count" -lt 1 ]; then
            echo "::error::no .swift files under Sources/NookSurface - did the MIT module move? License check would pass vacuously."
            fail=1
          fi
          if [ "$apache_count" -lt 1 ]; then
            echo "::error::no Apache-2.0 .swift files found - did the source layout move? License check would pass vacuously."
            fail=1
          fi

          # Every .swift file under Sources/NookSurface must declare SPDX MIT.
          while IFS= read -r f; do
            if ! head -3 "$f" | grep -q 'SPDX-License-Identifier: MIT'; then
              echo "::error file=$f::missing 'SPDX-License-Identifier: MIT' header"
              fail=1
            fi
          done < <(find Sources/NookSurface -name '*.swift')

          # Every other .swift file (Sources, Tests, Examples, App) must declare Apache-2.0.
          while IFS= read -r f; do
            if ! head -3 "$f" | grep -q 'SPDX-License-Identifier: Apache-2.0'; then
              echo "::error file=$f::missing 'SPDX-License-Identifier: Apache-2.0' header"
              fail=1
            fi
          done < <(find Sources Tests Examples App -name '*.swift' -not -path 'Sources/NookSurface/*' \
                   -not -path 'Tests/NookKitTests/NookSurfaceConcurrencyTests.swift' \
                   -not -path 'Tests/NookKitTests/NookShapeTests.swift')

          # The two cross-boundary test files belong with NookSurface (MIT) because
          # they @testable import it.
          for f in \
            Tests/NookKitTests/NookSurfaceConcurrencyTests.swift \
            Tests/NookKitTests/NookShapeTests.swift; do
            if [ -f "$f" ] && ! head -3 "$f" | grep -q 'SPDX-License-Identifier: MIT'; then
              echo "::error file=$f::missing 'SPDX-License-Identifier: MIT' header (cross-boundary test)"
              fail=1
            fi
          done

          if [ "$fail" -ne 0 ]; then
            echo "License-header check failed."
            exit 1
          fi
          echo "License headers OK."

  docs:
    name: DocC build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4
      # The Liquid Glass surface code references the macOS 26 SDK; match the other
      # jobs so symbol extraction compiles the real path.
      - uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable
      # Builds the same DocC reference Swift Package Index publishes per release
      # (.spi.yml), so a doc-comment change that breaks the build fails here at PR
      # time instead of silently breaking the next release's hosted docs.
      - name: Build the API reference
        run: ./Scripts/generate-docs.sh
