# XcodeGen spec for the Nook macOS app target. This file is the source of
# truth for the Xcode project layout; `Nook.xcodeproj` is generated by
# running `xcodegen generate` (or `Scripts/regenerate-xcodeproj.sh`).
#
# The app target is intentionally thin: its only Swift source is
# `App/main.swift`, which imports the `NookApp` library from the local SPM
# package and calls `NookApp.main()`. All real code lives in the SPM targets
# Xcode owns nothing but the bundle (Info.plist, signing).
#
# The SPM trampoline at `Sources/NookExecutable/main.swift` mirrors this
# trampoline so `swift run Nook` and Cmd-R behave identically modulo bundle
# layout (the SPM build has no `Contents/Info.plist` on disk).

name: Nook
options:
  bundleIdPrefix: com.example
  createIntermediateGroups: true
  deploymentTarget:
    macOS: "15.0"
  defaultConfig: Debug
  generateEmptyDirectories: true
  groupSortPosition: top

settings:
  base:
    SWIFT_VERSION: "5.9"
    MARKETING_VERSION: "0.2.0"
    CURRENT_PROJECT_VERSION: "1"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    CODE_SIGN_IDENTITY: "-"
    ENABLE_HARDENED_RUNTIME: YES

packages:
  Nook:
    path: "."

targets:
  # Target name is `NookHostApp` to avoid a scheme-name collision with the
  # SPM `Nook` executable product (both would otherwise resolve to the same
  # `xcodebuild -scheme Nook`). The user-facing bundle is still `Nook.app`
  # via `PRODUCT_NAME: Nook`.
  NookHostApp:
    type: application
    platform: macOS
    deploymentTarget: "15.0"
    sources:
      - path: App
        excludes:
          - "Info.plist"
          # Reference template only - committed so module authors can copy it. NOT wired
          # via CODE_SIGN_ENTITLEMENTS, so the demo stays unsandboxed and the dev loop is
          # unaffected. Excluded here so it isn't bundled as a stray resource. To actually
          # sandbox the app, add `CODE_SIGN_ENTITLEMENTS: App/Nook.entitlements` below.
          - "Nook.entitlements"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.example.nook
        PRODUCT_NAME: Nook
        INFOPLIST_FILE: App/Info.plist
        GENERATE_INFOPLIST_FILE: NO
        ENABLE_HARDENED_RUNTIME: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        COMBINE_HIDPI_IMAGES: YES
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: ""
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    dependencies:
      - package: Nook
        product: NookApp
